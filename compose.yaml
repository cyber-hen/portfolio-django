#
services:
  server:
    build:
      context: .
    container_name: portfolio_server
    restart: always
    environment:
      - DATABASE_URL=postgresql://hello_django:your_secure_password@db:5432/hello_django_dev
      - SECRET_KEY=your_secret_key
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy
  db:
     image: postgres:18
     container_name: portfolio_db
     restart: always
     volumes:
       - db-data:/var/lib/postgresql
     environment:
       - POSTGRES_DB=hello_django_dev
       - POSTGRES_USER=hello_django
       - POSTGRES_PASSWORD=your_secure_password
       - POSTGRES_HOST_AUTH_METHOD=trust
     expose:
       - 5432
     healthcheck:
       test: [ "CMD", "pg_isready", "-U", "hello_django" ]
       interval: 10s
       timeout: 5s
       retries: 5

  nginx:
    build: ./nginx
    volumes:
      - static_volume:/home/app/web/staticfiles
    ports:
      - 1337:80
    depends_on:
      - server

volumes:
   db-data:
   static_volume:
